<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #1a0033;
      color: white;
    }

    /* Navbar */
    header {
      background: black;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
    }

    nav a {
      background: #0a3d52;
      color: white;
      text-decoration: none;
      margin-left: 10px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
    }

    nav a:hover {
      background: #0f5f7d;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #2b004f, #3b006e);
      padding: 80px 40px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-wrap: wrap;
    }

    .hero img {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid #eee;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h2 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    .hero-text p {
      color: #f1c40f;
      line-height: 1.6;
      font-size: 15px;
    }

    /* Gallery */
    .gallery {
      padding: 60px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      background: black;
      text-align: center;
      padding: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>
	
  
  <!-- Header -->
  <header>
    <h1>PORTFOLIO</h1>
    <nav>
  <a href="index.html">Home</a>
  <a href="registrationForm.html">Registration</a>
  <a href="#">Contact</a>
  <a href="#">About</a>
  <a href="#">Shop</a>
  <a href="#">Account</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <img src="profile.png" alt="Profile Image">
    <div class="hero-text">
      <h2>MUHAMMAD AYYAN HAIDER</h2>
      <p>
        Hello! I'm Muhammad Ayyan Haider, I'm a designer. I thrive on iterative
        processes and am always focused on bridging the gap between user needs
        and business objectives.
      </p>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="gallery">
    <img src="art1.jpg" alt="Artwork 1">
    <img src="art2.jpg" alt="Artwork 2">
    <img src="art3.jpg" alt="Artwork 3">
    <img src="art4.jpg" alt="Artwork 4">
    <img src="art5.jpg" alt="Artwork 5">
  </section>

  <!-- Footer -->
  <footer>
    © Copyrights
  </footer>

</body>
</html>
